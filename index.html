<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <title>Weather</title>
</head>
<body>

    <div class="cards">
            <div class="card card--glass">
                <div class="card__content">
                    <header class="inputContainer">
                        <input type="text" class="inputCity js-cityInput" placeholder="Search City">
                        <button class="search-btn js-searchBtn">
                            <span class="material-symbols-outlined">
                        search</span>
                        </button>
                    </header>
                    <section class="weatherApp">
                        <section class="weather-info js-weatherInfo" style="display: none">
                            <div class="location-date-container">
                                <div class="location">
                                    <span class="material-symbols-outlined">location_on</span>
                                    <h4 class="country-txt">Dhaka</h4>
                                </div>
                                <h5 class="current-date-txt regular-txt">Mon, 09 Mar</h5>
                            </div>

                            <div class="weather-summary-container">
                                <img src="assets/weather/clouds.svg" class="weather-summary-img">
                                <div class="weather-summary-info">
                                    <h1 class="temp-txt">29 °C</h1>
                                    <h3 class="condition-txt regular-txt">Clouds</h3>
                                </div>
                            </div>

                            <div class="weather-conditions-container">
                                <div class="condition-item">
                                    <span class="material-symbols-outlined">water_drop</span>
                                    <div class="condition-info">
                                        <h5 class="regular-txt">Humidity</h5>
                                        <h5 class="humidity-value-txt">55%</h5>
                                    </div>
                                </div>

                                <div class="condition-item">
                                    <span class="material-symbols-outlined">air</span>
                                    <div class="condition-info">
                                        <h5 class="regular-txt">Wind Speed</h5>
                                        <h5 class="wind-speed-txt">2 M/s</h5>
                                    </div>
                                </div>
                            </div>

                            <div class="forecast-items-container">
                                <div class="forecast-item">
                                    <h5 class="forecast-item-date regular-txt">05 Aug</h5>
                                    <img src="assets/weather/thunderstorm.svg" class="forecast-item-img">
                                    <h5 class="forecast-item-temp">29 °C</h5>
                                </div>
                                <div class="forecast-item">
                                    <h5 class="forecast-item-date regular-txt">05 Aug</h5>
                                    <img src="assets/weather/thunderstorm.svg" class="forecast-item-img">
                                    <h5 class="forecast-item-temp">29 °C</h5>
                                </div>
                                <div class="forecast-item">
                                    <h5 class="forecast-item-date regular-txt">05 Aug</h5>
                                    <img src="assets/weather/thunderstorm.svg" class="forecast-item-img">
                                    <h5 class="forecast-item-temp">29 °C</h5>
                                </div>
                                <div class="forecast-item">
                                    <h5 class="forecast-item-date regular-txt">05 Aug</h5>
                                    <img src="assets/weather/thunderstorm.svg" class="forecast-item-img">
                                    <h5 class="forecast-item-temp">29 °C</h5>
                                </div>
                            </div>
                        </section>

                        <section class="search-city-container js-searchCityContainer">
                            <img src="assets/message/search-city.png">
                            <div class="search-city-message">
                                <h1 class="search-city-msg-title">
                                    Search City
                                </h1>
                                <h3 class="search-city-txt-msg regular-txt">
                                    Find out the conditions of the city
                                </h3>
                            </div>
                        </section>

                        <section class="js-not-found search-city-container" style="display: none;">
                            <img src="assets/message/not-found.png">
                            <div class="search-city-message">
                                <h1 class="search-city-msg-title">
                                    Search City
                                </h1>
                                <h3 class="search-city-txt-msg regular-txt">
                                    Find out the conditions of the city
                                </h3>
                            </div>
                        </section>
                    </section>
                </div>
                
        </div>
    </div>  

    <script src="scripts/weather.js"></script>
</body>
</html>
